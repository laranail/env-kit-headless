name: Bug report
description: Report a problem with env-kit-headless
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report.

        **Please do not paste real secret values from your `.env`** (API keys,
        passwords, tokens). Redact them — describe the variable shape instead.

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      description: What did you expect to happen instead?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Minimal steps (or code) to reproduce the behaviour.
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true

  - type: input
    id: versions
    attributes:
      label: Versions
      description: Package, PHP, and Laravel versions.
      placeholder: "env-kit-headless 1.0.0, PHP 8.4, Laravel 13.0"
    validations:
      required: true
