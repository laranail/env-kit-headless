name: Mutation

# Pest's native mutation testing (Infection does not support Pest suites).
# Mutation runs are slow, so this is scheduled/manual rather than per-push.
# The suite holds covered-MSI at ~87% (>= the 85% gate), so this job is a hard
# gate: a regression below 85% fails the run.

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1' # Mondays 06:00 UTC

jobs:
  mutate:
    name: Mutation score
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring
          coverage: pcov

      - name: Install dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Mutation testing (target MSI >= 85)
        run: vendor/bin/pest --mutate --covered-only --min=85
